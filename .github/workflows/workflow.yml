name: Azure Infrastructure CICD
on:
  push:
    branches:
      - main
env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_grafana_admin_password: ${{secrets.GRAFANA_ADMIN_PASSWORD}}
  TF_VAR_grafana_postgres_password: ${{secrets.GRAFANA_POSTGRES_PASSWORD}}
  TF_VAR_report_service_token_signing_key: ${{secrets.JWT_TOKEN_SIGNING_KEY}}
  TF_VAR_auth_user_username: ${{ secrets.AUTH_USER_USERNAME }}
  TF_VAR_auth_user_password: ${{ secrets.AUTH_USER_PASSWORD }}
  TF_VAR_auth_jwt_public_key: ${{ secrets.AUTH_JWT_PUBLIC_KEY }}
  TF_VAR_auth_jwt_private_key: ${{ secrets.AUTH_JWT_PRIVATE_KEY }}
  TF_VAR_service_principal_github: ${{ secrets.AZURE_CLIENT_ID }}

jobs:
  terraform-plan:
    name: Check/Build Terraform CICD
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan

      - name: Upload Terraform Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-file
          path: terraform/tfplan

  terraform-apply:
    name: Terraform Apply
    needs: terraform-plan
    runs-on: ubuntu-latest

    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup terraform
        uses: hashicorp/setup-terraform@v3

      - name: Download Terraform Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-file
          path: terraform

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply tfplan

