name: Azure Infrastructure CICD
on:
  push:
    branches:
      - main

jobs:
  terraform-cicd:
    name: Check/Build Terraform CICD
    runs-on: ubuntu-latest

    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_grafana_admin_password: ${{secrets.GRAFANA_ADMIN_PASSWORD}}
      TF_VAR_grafana_postgres_password: ${{secrets.GRAFANA_POSTGRES_PASSWORD}}
      TF_VAR_report_service_token_signing_key: ${{secrets.JWT_TOKEN_SIGNING_KEY}}
      TF_VAR_auth_user_username: ${{ secrets.AUTH_USER_USERNAME }}
      TF_VAR_auth_user_password: ${{ secrets.AUTH_USER_PASSWORD }}
      TF_VAR_auth_jwt_public_key: ${{ secrets.AUTH_JWT_PUBLIC_KEY }}
      TF_VAR_auth_jwt_private_key: ${{ secrets.AUTH_JWT_PRIVATE_KEY }}
      TF_VAR_service_principal_github: ${{ secrets.AZURE_CLIENT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup terraform
        uses: hashicorp/setup-terraform@v3

      - name: Run terraform
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve
